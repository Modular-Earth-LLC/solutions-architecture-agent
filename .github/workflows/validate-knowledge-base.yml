name: QA Validation

on:
  pull_request:
    branches: [main]
    paths:
      - 'knowledge_base/schemas/**'
      - 'skills/**'
      - 'agents/**'
      - '.claude-plugin/**'
      - 'tests/**'
      - 'CLAUDE.md'
      - '.repo-metadata.json'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install jsonschema

      - name: Schema validation
        run: python tests/validate_knowledge_base.py

      - name: Consistency validation
        run: python tests/validate_consistency.py

      - name: Plugin structure validation
        run: python tests/test_plugin_structure.py

      - name: Engagement flow validation
        run: python tests/test_engagement_flow.py

      - name: Skill independence validation
        run: python tests/test_skill_independence.py
